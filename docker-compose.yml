version: '3.9'

services:
  app:
    build: .
    container_name: e-commerce
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - LOCALCONNSTR=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/e-commerce?authSource=admin
    networks:
      - backend
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: mongo-db
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - backend

volumes:
  mongo-data:

networks:
  backend:
    driver: bridge